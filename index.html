<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Phone Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <h1>AI Phone Generator</h1>
        <p>Describe a phone style (e.g., "a futuristic transparent phone", "a retro 90s phone") and let AI generate it!</p>
        <div class="controls">
            <input type="text" id="prompt-input" placeholder="e.g., a phone made of wood">
            <button id="generate-btn">Generate</button>
        </div>
        <div id="loader" class="hidden">Generating your phone... this may take a moment.</div>
        <div id="result-container">
            <canvas id="phone-canvas"></canvas>
        </div>
        <div id="color-key-info" class="hidden">
            Screen Key Color: <span id="color-key-swatch"></span>
        </div>
    </div>
    <script type="module" src="main.js"></script>

</html>
